name: Build Service
on: [push] # 触发事件

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: /home/runner/work/ccache  # ccache 缓存目录
    steps:
      # - name: Install GCC 13+ (C++23 support)
      #   run: |
      #     sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
      #     sudo apt-get install -y g++-13 gcc-13
      #     sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 90
      #     sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 90
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # 指定明确版本如 '3.12'

      # 配置 ccache 编译缓存
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-xgboost
          max-size: 1024M  # 限制缓存大小

      # 4. 缓存 xgboost（固定版本，升级时改 key 中的版本号）
      - name: Cache xgboost build
        uses: actions/cache@v4
        id: cache-xgboost
        with:
          path: |
            xgboost/build
            /usr/local/include/xgboost
            /usr/local/lib/libxgboost.*
          key: ${{ runner.os }}-xgboost-v1.7.5
          restore-keys: |
            ${{ runner.os }}-xgboost-

      - name: Cache Boost build
        uses: actions/cache@v4
        id: cache-boost
        with:
          path: |
            /usr/local/include/boost
            /usr/local/lib/libboost*
          key: ${{ runner.os }}-boost-v1.89.0
          restore-keys: |
            ${{ runner.os }}-boost

      - name: Cache DuckDB build
        uses: actions/cache@v4
        id: cache-duckdb
        with:
          path: |
            duckdb/build
            /usr/local/lib/libduckdb*
            /usr/local/include/duckdb*
          key: ${{ runner.os }}-duckdb-v1.5.4
          restore-keys: |
            ${{ runner.os }}-duckdb-

      - name: Install dependencies
        if: steps.cache-xgboost.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y  libmlpack-dev libarmadillo-dev libpapi-dev libssl-dev 7zip
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          pip install cython
          cython --version

      # 仅当缓存未命中时编译 xgboost
      - name: Build xgboost (if cache miss)
        if: steps.cache-xgboost.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/dmlc/xgboost
          cd xgboost
          mkdir build && cd build
          cmake -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          sudo make install

      - name: Build boost (if cache miss)
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          wget https://archives.boost.io/release/1.89.0/source/boost_1_89_0.tar.gz
          tar -xzf boost_1_89_0.tar.gz
          cd boost_1_89_0
          ./bootstrap.sh --prefix=stage
          ./b2 install
          sudo cp -r stage/include /usr/local
          sudo cp -r stage/lib /usr/local
          sudo ldconfig

      - name: Build DuckDB (if cache miss)
        if: steps.cache-duckdb.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.5.4 https://github.com/duckdb/duckdb
          cd duckdb
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_UNIT_TESTS=OFF ..
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      # - name: Cache ONNX-runtime build
      #   uses: actions/cache@v4
      #   id: cache-onnxruntime
      #   with:
      #     path: |
      #       onnxruntime/build
      #       /usr/local/include/onnxruntime
      #       /usr/local/lib/libonnxruntime*
      #     key: ${{ runner.os }}-onnxruntime-${{ hashFiles('**/build.sh') }}
      #     restore-keys: |
      #       ${{ runner.os }}-onnxruntime-

      # - name: build ONNX-runtime (if cache miss)
      #   if: steps.cache-onnxruntime.outputs.cache-hit != 'true'
      #   run: |
      #     git clone --recursive https://github.com/microsoft/onnxruntime
      #     cd onnxruntime
      #     git checkout v1.22.2
      #     export ORT_BUILD_WITH_CACHE=1
      #     ./build.sh --config Release --build_shared_lib --compile_no_warning_as_error --parallel --skip_tests --cmake_extra_defines CMAKE_INSTALL_PREFIX=/usr/local
      #     cd build/Linux/Release && sudo make install

      - name: build third_party
        run: |
          git clone --recursive https://github.com/nanomsg/nng
          cd nng
          git checkout v1.11
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          sudo make install

          cd ..
          git clone --recursive https://github.com/TA-Lib/ta-lib
          cd ta-lib
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          sudo make install

      # 检出代码
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 配置CMake并编译
      - name: Configure and build
        run: |
          git clone --recursive https://github.com/fmtlib/fmt service/third_party/fmt
          cd service/third_party/fmt
          git checkout 12.0.0
          cd -
          git clone --recursive https://github.com/hosseinmoein/DataFrame service/third_party/DataFrame
          mkdir service/build && cd service/build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_NODE_IO_LOGGING=ON
          cmake --build . --config Release -j$(nproc)

      # 显示缓存统计（验证加速效果）
      - name: Show ccache stats
        run: ccache -s

      # 从模板和 Secrets 生成 config.json（供 test job 使用）
      - name: Generate config.json
        run: |
          cd service/build
          cp ../config.template.json ./config.json
          python3 -c "
          import json, os

          with open('config.json') as f:
              config = json.load(f)

          server = config.get('server', {})
          if os.environ.get('SERVER_USER'):
              server['user'] = os.environ['SERVER_USER']
          if os.environ.get('SERVER_PASSWD'):
              server['passwd'] = os.environ['SERVER_PASSWD']
          if os.environ.get('SERVER_JWT_SECRET'):
              server['jwt'] = os.environ['SERVER_JWT_SECRET']
          if os.environ.get('SERVER_PRODUCT_ID'):
              server['productID'] = os.environ['SERVER_PRODUCT_ID']
          if os.environ.get('SERVER_LLM_KEY'):
              server['llmkey'] = os.environ['SERVER_LLM_KEY']
          if os.environ.get('SERVER_PORT'):
              server['port'] = int(os.environ['SERVER_PORT'])
          if os.environ.get('SERVER_ADDR'):
              server['addr'] = os.environ['SERVER_ADDR']
          if os.environ.get('SERVER_SSL'):
              server['ssl'] = os.environ['SERVER_SSL']

          for ex in config.get('exchange', []):
              ex_name = ex.get('name', '')
              if ex_name == 'tickflow-quote' and os.environ.get('TICKFLOW_API_KEY'):
                  ex['passwd'] = os.environ['TICKFLOW_API_KEY']
              elif ex_name == 'tickflow-quote' and os.environ.get('TICKFLOW_USERNAME'):
                  ex['username'] = os.environ['TICKFLOW_USERNAME']

          risk = config.get('risk', {})
          capital_risk = risk.get('capitalRisk', {})
          if os.environ.get('INITIAL_CAPITAL'):
              capital_risk['initialCapital'] = float(os.environ['INITIAL_CAPITAL'])

          for br in config.get('broker', []):
              if os.environ.get('BROKER_COMMISSION'):
                  br['commission']['fee'] = float(os.environ['BROKER_COMMISSION'])
              if os.environ.get('BROKER_MIN_COMMISSION'):
                  br['commission']['min'] = float(os.environ['BROKER_MIN_COMMISSION'])

          with open('config.json', 'w') as f:
              json.dump(config, f, indent=4)
          print('config.json generated successfully')
          "
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWD: ${{ secrets.SERVER_PASSWD }}
          SERVER_PRODUCT_ID: ${{ secrets.SERVER_PRODUCT_ID }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_ADDR: ${{ secrets.SERVER_ADDR }}
          # SERVER_SSL: ${{ secrets.SERVER_SSL }}
          TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
          # TICKFLOW_USERNAME: ${{ secrets.TICKFLOW_USERNAME }}
          # INITIAL_CAPITAL: ${{ secrets.INITIAL_CAPITAL }}
          # BROKER_COMMISSION: ${{ secrets.BROKER_COMMISSION }}
          # BROKER_MIN_COMMISSION: ${{ secrets.BROKER_MIN_COMMISSION }}

      # 上传构建产物供 test job 使用（二进制 + config）
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            service/build/QuantService
            service/build/QuantService.debug
            service/build/config.json
          compression-level: 5
          retention-days: 1

      # 上传第三方 so 供 test job 使用
      - name: List files to upload
        run: |
          echo "=== third_party/libs/unix ==="
          ls -la service/third_party/libs/unix/ || echo "DIR NOT FOUND"
          echo "=== /usr/local/lib ==="
          ls -la /usr/local/lib/libxgboost.* /usr/local/lib/libduckdb.so* /usr/local/lib/libnng.so* /usr/local/lib/libta_lib.* 2>&1 || true

      - name: Upload runtime libs
        uses: actions/upload-artifact@v4
        with:
          name: runtime-libs
          path: |
            /usr/local/lib/libxgboost.*
            /usr/local/lib/libduckdb.so*
            /usr/local/lib/libnng.so*
            /usr/local/lib/libta_lib.*
            service/third_party/libs/unix/libfastsptraderapi.so
            service/third_party/libs/unix/libfasttraderapi.so
            service/third_party/libs/unix/libsptraderapi.so
            service/third_party/libs/unix/libthostmduserapi_se.so
            service/third_party/libs/unix/libthosttraderapi_se.so
            service/third_party/libs/unix/libtraderapi.so
            service/third_party/libs/unix/libxfastmdapi.so
            service/third_party/libs/unix/libxmdapi.so
            service/third_party/libs/unix/libxtpquoteapi.so
            service/third_party/libs/unix/libxtptraderapi.so
            service/third_party/libs/unix/libonnxruntime.so
          compression-level: 0
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-24.04
    env:
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
    steps:
      # 下载构建产物（二进制 + config）
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: service/build

      # 下载第三方 so
      - name: Download runtime libs
        uses: actions/download-artifact@v4
        with:
          name: runtime-libs
          path: runtime-libs

      - name: List downloaded runtime libs
        run: |
          echo "=== runtime-libs root ==="
          find runtime-libs -type f -o -type l 2>/dev/null | head -50 || echo "DIR EMPTY"
          echo "=== /usr/local/lib (after copy) ==="

      - name: Install runtime libraries
        run: |
          # 将 artifact 中的 so 安装到 /usr/local/lib
          sudo cp -f runtime-libs/usr/local/lib/lib*.so /usr/local/lib/ 2>/dev/null || true
          # third_party/libs/unix 下的券商/交易 SDK
          sudo cp -f runtime-libs/home/runner/work/QuasarX/QuasarX/service/third_party/libs/unix/lib*.so /usr/local/lib/ 2>/dev/null || true
          sudo ls /usr/local/lib
          sudo ldconfig

      - name: Make service executable
        run: |
          chmod +x service/build/QuantService

      - name: Install runtime dependencies (system libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpapi-dev libarmadillo-dev libmlpack-dev libssl-dev curl gdb
          sudo ldconfig

      - name: Install test dependencies (Python)
        run: |
          pip install pytest requests pyyaml

      - name: Create TLS certificates
        run: |
          echo "${{ secrets.SERVER_CRT }}" | base64 -d > service/build/server.crt

      # === 阶段 1: 服务生命周期测试（启动 + 稳定 + 优雅退出）===

      - name: Start service (lifecycle test)
        id: start_service
        run: |
          # 允许生成 core dump 以便崩溃时获取堆栈
          ulimit -c unlimited
          echo "core" | sudo tee /proc/sys/kernel/core_pattern 2>/dev/null || true
          cd service/build
          nohup ./QuantService config.json > service_lifecycle.log 2>&1 &
          SERVICE_PID=$!
          echo "pid=$SERVICE_PID" >> $GITHUB_OUTPUT
          echo "Service started with PID $SERVICE_PID"
          for i in $(seq 1 30); do
            if curl -sk https://localhost:${{ env.SERVER_PORT }}/v0/server/status >/dev/null 2>&1; then
              echo "Service is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Service start timeout after 30s"
          cat service_lifecycle.log
          exit 1

      - name: Verify service stability
        run: |
          sleep 5
          SERVICE_PID=${{ steps.start_service.outputs.pid }}
          if kill -0 "$SERVICE_PID" 2>/dev/null; then
            echo "Service (PID $SERVICE_PID) is still running — stability check passed"
          else
            echo "Service crashed after startup"
            echo "=== Log output ==="
            cat service/build/service_lifecycle.log
            echo ""
            echo "=== Stack trace from core dump (if any) ==="
            # 尝试多种 core dump 路径
            CORE_FILE=$(ls -t /tmp/core.* service/build/core.* /var/lib/systemd/coredump/core* 2>/dev/null | head -1)
            if [ -n "$CORE_FILE" ]; then
              gdb -batch \
                -ex "file service/build/QuantService" \
                -ex "symbol-file service/build/QuantService.debug" \
                -ex "bt full" \
                -ex "info registers" \
                -ex "x/10i \$pc" \
                -c "$CORE_FILE" 2>&1 || true
            else
              echo "No core dump found — check log output above for signal handler backtrace"
            fi
            exit 1
          fi
          STATUS=$(curl -sk https://localhost:${{ env.SERVER_PORT }}/v0/server/status)
          echo "Status response: $STATUS"

      - name: Stop service (graceful shutdown test)
        id: stop_service
        if: always()
        run: |
          SERVICE_PID=${{ steps.start_service.outputs.pid }}
          echo "Sending graceful shutdown request to service (PID $SERVICE_PID)..."
          curl -sk -X POST https://localhost:${{ env.SERVER_PORT }}/v0/exit 2>/dev/null || true
          for i in $(seq 1 10); do
            if ! kill -0 "$SERVICE_PID" 2>/dev/null; then
              echo "Service exited gracefully after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Graceful shutdown timeout, sending SIGKILL to PID $SERVICE_PID"
          kill -9 "$SERVICE_PID" 2>/dev/null || true
          echo "Service forced to terminate"
          cat service/build/service_lifecycle.log || true
          exit 1

      # === 阶段 2: 回测功能测试 ===

      # - name: Run backtest tests
      #   id: test
      #   run: |
      #     cd service/build
      #     nohup ./QuantService config.json > service_test.log 2>&1 &
      #     TEST_PID=$!
      #     echo "Test service PID: $TEST_PID"
      #     for i in $(seq 1 30); do
      #       if curl -sk https://localhost:${{ env.SERVER_PORT }}/v0/server/status >/dev/null 2>&1; then
      #         echo "Test service ready"
      #         break
      #       fi
      #       sleep 1
      #     done
      #     cd ../test
      #     python testcases/generate_test_data.py 2>/dev/null || true
      #     python run_tests.py --mode stock_hist_sim --no-service
      #     TEST_EXIT_CODE=$?
      #     curl -sk -X POST https://localhost:${{ env.SERVER_PORT }}/v0/exit 2>/dev/null || true
      #     sleep 2
      #     kill -9 $TEST_PID 2>/dev/null || true
      #     exit $TEST_EXIT_CODE

      # === 阶段 3: 测试通过后上传最终构建 ===

      - name: Upload Build (passed tests)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            service/build/QuantService
          compression-level: 5

      - name: Upload test failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-report
          path: |
            service/build/service_lifecycle.log
            service/build/service_test.log
          compression-level: 0
          retention-days: 7