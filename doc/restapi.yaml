          description: 滚动波动率，key 为窗口大小
        upper_2sigma:
          type: array
          items:
            type: number
          description: 波动率包络 ±2σ 上界
        mean_price:
          type: array
          items:
            type: number
          description: 滚动均值价格
        lower_2sigma:
          type: array
          items:
            type: number
          description: 波动率包络 ±2σ 下界
        annual_volatility:
          type: number
          description: 年化波动率
        max_drawdown:
          type: number
          description: 最大回撤率
        skewness:
          type: number
          description: 收益率偏度
        kurtosis:
          type: number
          description: 收益率超额峰度
        var_95:
          type: number
          description: 95% VaR
        cvar_95:
          type: number
          description: 95% CVaR
        returns_acf:
          type: array
          items:
            type: number
          description: 收益率 ACF
        returns_pacf:
          type: array
          items:
            type: number
          description: 收益率 PACF
        abs_returns_acf:
          type: array
          items:
            type: number
          description: 绝对收益率 ACF
        acf_decay:
          $ref: "#/components/schemas/ACFDecayAnalysis"
        forecast_returns:
