        imf_components:
          type: array
          items:
            type: array
            items:
              type: number
          description: IMF 分量数组，每个元素是一个时间序列
        residual:
          type: array
          items:
            type: number
          description: 残差序列（原始信号减去所有 IMF）
        imf_info:
          type: array
          items:
            $ref: "#/components/schemas/IMFInfo"
          description: 各 IMF 分量的频率特征和能量分布
        reconstruction_error:
          type: number
