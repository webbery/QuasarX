  /analysis/signal:
    get:
      summary: EMD 信号分解分析
      description: |
        对指定标的的价格序列进行经验模态分解 (EMD/CEEMDAN)，
        输出 IMF 分量、残差、能量分布和平均周期。
        用于信号的频率成分分析和周期结构识别。
      tags:
        - Analysis
      parameters:
        - in: query
          name: symbols
          required: true
          schema:
            type: string
          description: 标的代码（目前只处理第一个标的），逗号分隔
          example: sz.900001
        - in: query
          name: start_date
          schema:
            type: string
            format: date
          description: 开始日期（YYYY-MM-DD）
          example: "2024-01-01"
        - in: query
          name: end_date
          schema:
            type: string
            format: date
          description: 结束日期（YYYY-MM-DD）
          example: "2025-06-01"
        - in: query
          name: field
          schema:
            type: string
            enum: [close, open, high, low, volume, turnover]
          description: 分析字段（默认 close）
          example: close
        - in: query
          name: method
          schema:
            type: string
            enum: [emd, ceemdan]
          description: 分解方法（默认 emd）
          example: emd
        - in: query
          name: num_imfs
          schema:
            type: integer
            minimum: 1
            maximum: 20
          description: IMF 数量（默认 5）
          example: 5
        - in: query
          name: fill_method
          schema:
            type: string
            enum: [None, Forward, Backward, Linear, Zero]
          description: 缺失值填充方法（默认 None）
      responses:
        '200':
          description: EMD 分解结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalResponse"
        '400':
          description: 参数错误/数据不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /analysis/volatility:
    get:
      summary: 波动率与自相关分析
      description: |
        对指定标的进行波动率分析，包含：
        - 单标的：滚动波动率、收益率分布、ACF/PACF、波动率包络带、AR(p) 预测
        - 多标的：协方差矩阵、相关系数矩阵、特征值分解、协方差外推预测
      tags:
        - Analysis
      parameters:
        - in: query
          name: symbols
          required: true
          schema:
            type: string
          description: 标的代码列表，逗号分隔（如 sz.000001,sh.600000）
          example: sz.000001,sh.600000
        - in: query
          name: start_date
          schema:
            type: string
            format: date
          description: 开始日期（YYYY-MM-DD）
          example: "2024-01-01"
        - in: query
          name: end_date
          schema:
            type: string
            format: date
          description: 结束日期（YYYY-MM-DD）
          example: "2025-06-01"
        - in: query
          name: windows
          schema:
            type: string
          description: 滚动窗口大小，逗号分隔（默认 20,60,120）
          example: "20,60,120"
        - in: query
          name: field
          schema:
            type: string
            enum: [close, open, high, low, volume]
          description: 分析字段（默认 close）
          example: close
        - in: query
          name: fill_method
          schema:
            type: string
            enum: [None, Forward, Backward, Linear, Zero]
          description: 缺失值填充方法
      responses:
        '200':
          description: 波动率分析结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolatilityResponse"
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ═══════════════════════════════════════════════════════════
  #  行情数据
  # ═══════════════════════════════════════════════════════════
  /quote:
    get:
      summary: 查询行情数据 / 列出表和标的
      description: |
        查询行情数据或列出可用表和标的：
        - 无参数：列出所有行情表（stock_1d, etf_5m 等）及各类别下的标的、时间范围
        - table + symbol：查询该标的的行情 K 线明细
      tags:
        - Quote
      parameters:
        - in: query
          name: table
          schema:
            type: string
          description: 表名（如 stock_1d, etf_5m）
          example: stock_1d
        - in: query
          name: symbol
          schema:
            type: string
          description: 标的代码（如 sh.600000）
          example: sh.600000
        - in: query
          name: start
          schema:
            type: string
          description: 起始时间（YYYY-MM-DD 或 YYYY-MM-DD HH:MM:SS）
        - in: query
          name: end
          schema:
            type: string
          description: 结束时间
        - in: query
          name: limit
          schema:
            type: integer
            default: 5000
          description: 返回条数上限
      responses:
        '200':
          description: 行情数据或表列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: 触发行情数据下载与导入
      description: |
        后台异步下载行情数据并导入 DuckDB，通过 SSE 推送进度事件。
        自动按标的类型（ETF/Stock）分组下载，同时下载后复权和不复权数据。
      tags:
        - Quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteDownloadRequest"
      responses:
        '200':
          description: 下载任务已启动
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDownloadResponse"
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: 删除行情数据
      description: |
        按条件删除行情数据：
        - table + symbol：删除指定表中指定标的数据
        - 仅 table：删除整张表
        - 无参数：删除所有行情表
      tags:
        - Quote
      parameters:
        - in: query
          name: table
          schema:
            type: string
          description: 表名（留空删除所有表）
        - in: query
          name: symbol
          schema:
            type: string
          description: 标的代码（留空删除整表）
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDeleteResponse"
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /quote/data:
    post:
      summary: 导入/导出行情数据
      description: |
        直接操作行情数据库：
        - action=import：将 CSV 行数据导入指定表
        - action=export：导出指定标的数据为 CSV 或 JSON
      tags:
        - Quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteDataRequest"
      responses:
        '200':
          description: 操作结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  table:
                    type: string
                  symbol:
                    type: string
                  imported_rows:
                    type: integer
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: 清理行情数据
      description: 清理指定表或标的的行情数据（支持 drop table / delete symbol）
      tags:
        - Quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  description: 固定为 cleanup
                table:
                  type: string
                  description: 表名（留空操作所有表）
                symbol:
                  type: string
                  description: 标的代码（留空清理整表）
              example:
                action: cleanup
                table: stock_1d
                symbol: sh.600000
      responses:
        '200':
          description: 清理结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

