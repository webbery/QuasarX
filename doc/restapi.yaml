        field:
          type: string
          description: 使用的数据字段
        method:
          type: string
          enum: [emd, ceemdan]
          description: 使用的分解方法
        dates:
          type: array
          items:
            type: string
          description: 日期序列
        original:
          type: array
          items:
            type: number
