          type: integer
          format: int64
          example: 100000
        msg:
          type: string
          example: error

    # 波动率分析相关类型
    ACFDecayAnalysis:
      type: object
      description: ACF 衰减模式分析结果
      properties:
        lb_statistic:
          type: number
          description: Ljung-Box Q 统计量
        lb_pvalue:
          type: number
          description: Ljung-Box p 值（p < 0.05 表示存在显著自相关）
        has_autocorrelation:
          type: boolean
          description: 是否存在显著自相关
        exponential_r2:
          type: number
          description: 指数衰减拟合 R²（GARCH/EGARCH）
        hyperbolic_r2:
          type: number
          description: 双曲衰减拟合 R²（FIGARCH/长记忆）
        decay_mode:
          type: string
          enum: [exponential, hyperbolic, inconclusive]
          description: 衰减模式
        decay_half_life:
          type: number
          description: 指数衰减半衰期
        hurst_estimate:
          type: number
          description: Hurst 指数估计

    ForecastResult:
      type: object
      description: AR(p) 自回归预测结果
      properties:
        source_series:
          type: string
          enum: [returns, rolling_vol]
          description: 预测来源序列
        order_p:
          type: integer
          description: AR 模型阶数
        ar_coeffs:
          type: array
          items:
            type: number
          description: AR 系数 φ₁, φ₂, ..., φₚ
        residual_var:
          type: number
          description: 残差方差 σ²
        forecast_values:
          type: array
          items:
            type: number
          description: 预测值序列（1..p 步）
        forecast_upper_1sigma:
          type: array
          items:
            type: number
          description: ±1σ 置信上界
        forecast_lower_1sigma:
          type: array
          items:
            type: number
          description: ±1σ 置信下界
        forecast_upper_2sigma:
          type: array
          items:
            type: number
          description: ±2σ 置信上界
        forecast_lower_2sigma:
          type: array
          items:
            type: number
          description: ±2σ 置信下界
        forecast_std:
          type: array
          items:
            type: number
          description: 每步预测标准差（用于前端渐变透明度）
        has_autocorrelation:
          type: boolean
          description: 是否存在显著自相关（false 时预测结果无效）
        note:
          type: string
          description: 诊断信息（如 "AR(5) from returns, R²≈0.23"）

    VolatilitySingleResult:
      type: object
      description: 单标的波动率分析结果
      properties:
        prices:
          type: array
          items:
            type: number
