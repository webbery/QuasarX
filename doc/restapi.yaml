openapi: "3.0.3"
info:
  title: QuasarX API
  description: QuasarX Rest API接口
  version: "0.0.1"
servers:
  - url: http://localhost:19107/v0
paths:
  /stocks/simple:
    get:
      summary: stock's symbol and name
      description: 获取所有股票的代码和名称
      tags: 
        - Stocks
      responses:
        '200':
          description: An array of stocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockList"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /stocks/detail:
    get:
      summary: stock detail info
      description: 当前时刻股票的信息(价格/量/换手率等)
      tags:
        - Stocks
      parameters:
      - in: query
        name: id
        schema:
          type: string
        description: 要获取的合约代码
      responses:
        '200':
          description: An array of stocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockDetail"
  /stocks/history:
    get:
      summary: get stock history
      description: 获取指数信息
      tags:
        - Stocks
      parameters:
        - in: query
          name: id
          schema:
            type: string
          description: 要获取的代码
          example: 000001
        - in: query
          name: type
          schema:
            type: string
          description: 数据频率
          example: 1d
        - in: query
          name: start
          schema:
            type: integer
          description: 起始时间
        - in: query
          name: end
          schema:
            type: integer
          description: 结束时间
        - in: query
          name: right
          schema:
            type: integer
          description: 复权方式,1-后复权
      responses:
        '200':
          description: An array of stocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
  /stocks/params:
    get:
      summary: 获取股票下单参数
      description: 获取股票下单参数
      tags: 
        - Stocks
      responses:
        '200':
          description: An array of stocks
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_limit:
                    type: integer
                    description: 每秒下单最大次数
                  daily_limit:
                    type: integer
                    description: 每日下单最大次数
                  cancel_limit:
                    type: integer
                    description: 每秒撤单最大次数
    put:
      summary: 股票下单参数设置
      description: 股票下单参数设置
      tags: 
        - Stocks
      requestBody:
        description: 下单参数
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_limit:
                  type: integer
                  description: 每秒下单最大次数
                daily_limit:
                  type: integer
                  description: 每日下单最大次数
                cancel_limit:
                  type: integer
                  description: 每秒撤单最大次数
      responses:
        '200':
          description: success or not
  /stocks/sector/flow:
    get:
      summary: get flow info
      description: 获取板块资金流信息
      tags:
        - Sector
      parameters:
        - in: query
          name: type
          schema:
            type: integer
            description: 1- 所有历史 0- 当日信息
      responses:
        '200':
          description: An array of sectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SectorItem"
  /stocks/sector/quote:
    get:
      summary: 行业板块实时行情
      description: 获取当前所有行业板块的实时行情数据，按涨跌幅排名
      tags:
        - Sector
      responses:
        '200':
          description: 行业板块行情列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  date:
                    type: string
                    description: 日期
                    example: "2025-06-03"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SectorQuote"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /stocks/verbose:
    get:
      summary: stock verbose info
      description: 股票的详细信息(基本面/板块/十大股东/主营业务等)
      tags:
        - Stocks
      parameters:
      - in: query
        name: id
        schema:
          type: integer
          description: 要获取的合约代码
      responses:
        '200':
          description: An array of sectors
          content:
            application/json:
              schema:
                type: object
  /stocks/privilege:
    get:
      summary: 查询股票的交易权限
      description: 查询股票的交易权限
      tags:
        - Stocks
      parameters:
        - in: query
          name: id
          schema:
            type: string
          description: 要查询的股票代码
      responses:
        '200':
          description: An array of stocks
          content:
            application/json:
              schema:
                type: object
                properties:
                  forbid:
                    type: boolean
                    description: 是否禁止交易
                  message:
                    type: string
                    description: 禁止交易原因
        '400':
          description: 失败
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    description: 失败错误码
  /stocks/range:
    get:
      summary: 获取股票当日涨跌停价格
      description: 获取股票当日涨跌停价格
      tags:
        - Stocks
      parameters:
        - in: query
          name: id
          schema:
            type: string
          description: 要获取的股票代码
      responses:
          '200':
            description: An array of stocks
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    code:
                      type: string
                      description: 股票代码
                    upper:
                      type: number
                      description: 股票涨停价
                    lower:
                      type: number
                      description: 股票跌停价
  /options/detail:
    get:
      summary: 当前期权的信息
      description: 当前期权的信息(基本信息、希腊字母及隐波等)
      tags:
        - Options
      parameters:
        - in: query
          name: id
          schema:
            type: string
          description: 要获取的期权代码
        - in: query
          name: type
          schema:
            type: integer
          description: 期权代码类型 0-上交所深交所etf期权, 1-期货类期权
      responses:
          '200':
            description: An array of stocks
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    name:
                      type: string
                      description: 期权名称
                    symbol:
                      type: string
                      description: 期权代码

  /index/quote:
    get:
      summary: get index info
      description: 获取指数信息
      tags: 
        - Index
      parameters:
        - in: query
          name: id
          schema:
            type: string
          description: 要获取的指数代码,多个时用逗号分开
      responses:
        '200':
          description: An array of stocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexQuote"
  /simulate:
    post:
      summary: simulate a exchange
      description: 交易所仿真
      tags: 
        - Simulate
      requestBody:
        description: 交易所信息
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateRequest"
      responses:
        '200':
          description: success or not
  /risk/stoploss:
    post:
      summary: stoploss
      description: 止损设置
      tags: 
        - Risk
      requestBody:
        description: 止损参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopLossRequest"
      responses:
        '200':
          description: success or not
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopLossResponse"
    delete:
      summary: stoploss
      description: 删除设置的止损
      tags: 
        - Risk
      parameters:
        - in: query
          name: id
          schema:
            type: integer
          description: 要删除的id
      responses:
        '200':
          description: success
    get:
      summary: stoploss
      description: 获取所有设置的止损
      tags: 
        - Risk
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StopLossList"
  /risk/var:
    post:
      summary: run strategy for VaR
      description: 计算策略的VaR
      tags:
        - Risk
      requestBody:
        description: 计算VaR的参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaRRequest"
      responses:
        '200':
          description: success or not
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaRResponse"
    get:
      summary: get strategy of history VaR
      description: 获取历史计算出的策略的VaR
      tags:
        - Risk
      parameters:
        - in: query
          name: id
          schema:
            type: integer
            description: 佣金id
      responses:
        '200':
          description: success or not
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaRHistoryItem"
  /risk/drawdown:
    get:
      summary: drawdown
      description: 获取给定时间范围内的最大回撤
      tags:
        - Risk
      parameters:
        - in: query
          name: range
          schema:
            type: integer
            enum: [0, 1]
            description: 0-近90天,1-指定时间开始
            example: 0
        - in: query
          name: symbol
          schema:
            type: string
            description: 多个合约或者指定的持仓
            example: ap2501C2508,ap2502C2509
        - in: query
          name: datetime
          schema:
            type: integer
            description: 可选, 当type=1时指定的时间,单位s
            example: 1739174267836
      responses:
        '200':
          description: success or not
          content:
            application/json:
              schema:
                type: array
                items:
                  type: number
  /risk/capital:
    get:
      summary: get capital risk config
      description: 获取总资金风控配置和状态
      tags:
        - Risk
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapitalRiskConfig"
    post:
      summary: set capital risk config
      description: 设置总资金止损配置
      tags:
        - Risk
      requestBody:
        description: 总资金风控参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapitalRiskSetRequest"
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapitalRiskConfig"
        '400':
          description: invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /risk/daily:
    get:
      summary: get daily loss risk config
      description: 获取单日亏损风控配置和状态
      tags:
        - Risk
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRiskConfig"
    post:
      summary: set daily loss risk config
      description: 设置单日亏损限额配置
      tags:
        - Risk
      requestBody:
        description: 单日亏损风控参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyRiskSetRequest"
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRiskConfig"
        '400':
          description: invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /risk/closeall:
    post:
      summary: close all positions
      description: 手动触发全部平仓（资金风控触发时使用）
      tags:
        - Risk
      requestBody:
        description: 平仓确认参数
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                confirm:
                  type: boolean
                  description: 确认平仓，必须为 true 才会执行
                  example: true
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseAllResponse"
        '400':
          description: confirmation required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: close failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /risk/strategies:
    get:
      summary: strategy risk metrics
      description: 获取所有策略的风险指标和健康度评估数据，包括信息比率(IR)、CUSUM信号、VaR、最大回撤、夏普比率、胜率等。前端根据 IR 和 CUSUM 信号计算策略健康度。
      tags:
        - Risk
      responses:
        '200':
          description: 策略风险指标列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyRiskItem"
        '500':
          description: 策略系统未初始化
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /risk/factor/liquidity:
    get:
      summary: liquidity
      description: 获取给定时间范围内的流动性风险因子
      tags:
        - Risk
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
            description: 多个合约或者指定的持仓
            example: ap2501C2508,ap2502C2509
        - in: query
          name: datetime
          schema:
            type: integer
            description: 可选, 当type=1时指定的时间,单位s
            example: 1739174267836
      responses:
        '200':
          description: success or not
          content:
            application/json:
              schema:
                type: array
                items:
                  type: number
  /portfolio:
    put:
      summary: portfolio
      description: 创建一个投资组合PH
      tags: 
        - Portfolio
      requestBody:
        description: 投资组合参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioRequest"
      responses:
        '200':
          description: success or not
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResponse"
  /commission:
    get:
      summary: commission
      description: 获取佣金
      tags: 
        - User
      parameters:
        - in: query
          name: id
          schema:
            type: string
            description: 代码,可选，只针对期货
            example: 12
        - in: query
          name: broker
          schema:
            type: string
            description: 代理商,保留
        - in: query
          name: type
          schema:
            type: integer
            description: 类型, 0-股票 1-期货 2-期权
            enum: [0, 1, 2]
      responses:
        '200':
          description: success or not
          content:
            application/json:
              schema:
                type: array
                description: 返回的佣金信息
                items:
                  $ref: "#/components/schemas/CommissionItem"
  /strategy/metric:
    get:
      summary: metric
      description: 获取策略的评价指标
      tags: 
        - Strategy
      parameters:
        - in: query
          name: id
          schema:
            type: integer
          description: 要获取的策略id, 0-表示一直持有的策略
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyMetrics"
  /strategy:
    get:
      summary: 获取所有策略列表
      description: 获取所有策略的名称和运行状态
      tags:
        - Strategy
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyStatus"
    post:
      summary: 部署/运行/停止指定的某个策略
      description: 根据 mode 参数执行不同操作：0-部署并运行策略，1-运行已部署的策略，2-停止运行中的策略
      tags:
        - Strategy
      requestBody:
        description: 参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyRequest"
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyResponse"
    delete:
      summary: 删除指定的某个策略
      description: 停止并删除指定的策略及其脚本文件
      tags:
        - Strategy
      requestBody:
        description: 参数
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 策略名称
              required:
                - name
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
  /backtest:
    post:
      summary: 对某个策略做回测
      description: 对某个策略做回测
      tags: 
        - Backtest
      requestBody:
        description: 参数
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                script:
                  type: string
                  description: 策略图的json
                  example: ""
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResponse"
        '404':
          description: fail
  /strategy/nodes:
    get:
      summary: 获取所有策略节点参数等信息
      description: 获取策略节点信息
      tags: 
        - Strategy
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                
  /strategy/node:
    get:
      summary: 策略节点上的下载功能，如下载调试输出
      description: 策略节点上的下载功能，如下载调试输出
      tags: 
        - Strategy
      parameters:
        - in: query
          name: strategy
          schema:
            type: string
          description: 对应的策略名
        - in: query
          name: label
          schema:
            type: string
          description: 对应的debug节点标签
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
    put:
      summary: 策略节点上的上传功能，如上传模型
      description: 策略节点上的上传功能，如上传模型
      tags: 
        - Strategy
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
  /predict/montecarlo:
    post:
      summary: predict price of asset
      description: use monte carlo predict price
      tags: 
        - Predict
      requestBody:
        description: 参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonteCarloRequest"
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonteCarloResponse"
  /predict/finity:
    post:
      summary: predict price of asset
      description: use finity difference method to predict
      tags: 
        - Predict
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  symbols:
                    type: string
                    example: 111000,000001
  /predict/operation:
    put:
      summary: set prediction
      description: 设置预测的操作,即接下来某个时间内应该执行的操作
      tags: 
        - Predict
      requestBody:
        description: 预测参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionOperationRequest"
      responses:
        '200':
          description: success
    get:
      summary: get prediction
      description: 获取预设置的操作
      tags: 
        - Predict
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
          description: symbol
        - in: query
          name: exchange
          schema:
            type: string
          description: exchange
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PredictionItem"
    delete:
      summary: delete prediction
      description: 删除预设置的操作
      tags: 
        - Predict
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
            description: symbol
        - in: query
          name: index
          schema:
            type: integer
            description: index of query prediction
        - in: query
          name: exchange
          schema:
            type: integer
            description: 0-simulate, 1-xtp, 2-ctp
      responses:
        '200':
          description: success
  /future/simple:
    get:
      summary: all future info
      description: get future name and symbol
      tags: 
        - Future
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FutureItem"
  /feature:
    get:
      summary: features
      description: get features of symbol
      tags: 
        - Feature
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
          description: symbol
        - in: query
          name: start
          schema:
            type: integer
          description: start time
        - in: query
          name: end
          schema:
            type: integer
          description: end time
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: number
  /data/sync:
    get:
      summary: sync data
      description: 同步服务保存的数据，同步完成后清空当前服务保存的数据
      tags: 
        - Data
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
  /user/login:
    post:
      summary: login
      description: 登录服务
      tags: 
        - User
      requestBody:
        description: 参数
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        '200':
          description: success
          content:
