  # ═══════════════════════════════════════════════════════════
  #  分红除权数据
  # ═══════════════════════════════════════════════════════════
  /dividend:
    get:
      summary: 查询分红除权数据
      description: |
        查询分红除权数据：
        - 无参数：列出所有已导入分红数据的标的
        - date=YYYY-MM-DD：查询该日所有除权除息事件
        - code=XXXXXX.SH：查询该标的的分红历史
        - code + start + end：查询指定日期范围的分红历史
      tags:
        - Dividend
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: 查询指定日期的除权除息事件（YYYY-MM-DD）
          example: "2026-07-25"
        - in: query
          name: code
          schema:
            type: string
          description: 标的代码（如 600519.SH）
          example: 600519.SH
        - in: query
          name: start
          schema:
            type: string
            format: date
          description: 起始日期（YYYY-MM-DD，配合 code 使用）
        - in: query
          name: end
          schema:
            type: string
            format: date
          description: 结束日期（YYYY-MM-DD，配合 code 使用）
      responses:
        '200':
          description: 分红数据查询结果
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/DividendByDateResponse"
                  - $ref: "#/components/schemas/DividendBySymbolResponse"
                  - $ref: "#/components/schemas/DividendSymbolListResponse"
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: 触发分红数据下载与导入
      description: |
        后台异步从 BaoStock 下载分红数据，保存 CSV 到 data/dividend/，
        然后扫描该目录导入到 finance.db 的 dividend 表。
        通过 SSE 推送进度事件（事件名: dividend_download）。

        标的来源：
        - symbols：显式传入选股列表（逗号分隔）
        - from_strategies=true：从活跃策略自动收集标的（默认）
        - 两者都为空：使用内置默认列表
      tags:
        - Dividend
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DividendDownloadRequest"
      responses:
        '200':
          description: 下载任务已启动
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DividendDownloadResponse"
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: 删除分红数据
      description: |
        删除分红除权数据：
        - 无参数：删除整张 dividend 表
        - code=XXXXXX.SH：仅删除该标的的分红记录
      tags:
        - Dividend
      parameters:
        - in: query
          name: code
          schema:
            type: string
          description: 标的代码（留空删除整表）
          example: 600519.SH
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DividendDeleteResponse"
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ═══════════════════════════════════════════════════════════
  #  XGBoost 训练与分析
  # ═══════════════════════════════════════════════════════════
  /xgboost:
    post:
      summary: XGBoost 训练 / SHAP 计算 / 模型删除
      description: |
        单端点设计，通过 body 中的 "action" 字段路由不同操作：

        - action=train：训练模型
          1. 解析策略图，提取 XGBoost 上游子图
          2. 部分执行回测，收集节点输出作为特征
          3. 调用 xgboost_train.py 训练模型
          4. 返回学习曲线、特征重要性、评估指标、预测结果等 JSON
          5. 模型句柄保留在内存供 SHAP 计算

        - action=shap：计算 SHAP 值
          使用 XGBoost C API 在 C++ 端直接计算（XGBOOST_OUTPUT_CONTRIBUTION），
          不依赖 Python shap 库，不持久化到数据库。

        - action=delete：释放内存中的模型

        训练结果（学习曲线/特征重要性/评估指标/预测）不存数据库，
        训练完成后通过单次 JSON 响应返回前端，前端 useXGBoostState 缓存。
      tags:
        - XGBoost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/XGBoostTrainRequest"
                - $ref: "#/components/schemas/XGBoostShapRequest"
                - $ref: "#/components/schemas/XGBoostDeleteRequest"
            examples:
              train:
                summary: 训练模型
                value:
                  action: train
                  script: '{"id":"strategy_demo","nodes":[...], "edges":[...]}'
                  label:
                    source: sh.600000.close
                    period: 5
                    type: classification
                    threshold: 0.0
                  objective: binary:logistic
                  num_class: 2
                  test_ratio: 0.2
                  params:
                    learning_rate: 0.1
                    max_depth: 6
                    n_estimators: 200
                    early_stopping_rounds: 20
              shap:
                summary: 计算 SHAP 值
                value:
                  action: shap
                  model_id: 1
              delete:
                summary: 删除模型
                value:
                  action: delete
                  model_id: 1
      responses:
        '200':
          description: |
            操作结果。
            train 返回训练指标 + predictions + feature_importance + learning_curve + model_id
            shap 返回 shap 矩阵 + features + base_value
            delete 简单返回 message
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/XGBoostTrainResponse"
                  - $ref: "#/components/schemas/XGBoostShapResponse"
                  - $ref: "#/components/schemas/XGBoostDeleteResponse"
        '400':
          description: 参数错误（如缺 action 字段、label.source 缺失）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '404':
          description: 模型未找到（shap/delete 操作时）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

