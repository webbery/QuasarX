              gain: { type: number }
              weight: { type: number }
              cover: { type: number }
        eval_metrics:
          type: object
          additionalProperties: { type: number }
        predictions:
          type: array
          items:
            type: object
            properties:
              actual: { type: number }
              predicted: { type: number }
              pred_class: { type: integer }

    XGBoostShapResponse:
      type: object
      properties:
        model_id: { type: integer }
        features:
          type: array
          items: { type: string }
        shap:
          type: array
          items:
            type: array
            items: { type: number }
        base_value:
          type: array
          items: { type: number }
        n_samples: { type: integer }

    XGBoostDeleteResponse:
      type: object
      properties:
        message: { type: string, example: "deleted" }

    # ── 分红除权数据 schemas ──

    DividendRecord:
      type: object
      description: 单条分红除权记录
      properties:
        symbol:
          type: string
          description: 标的代码
          example: 600519.SH
        announce_date:
          type: string
          format: date
          description: 公告日
        report_year:
          type: string
          description: 年报年份
          example: "2025"
        ex_dividend_date:
          type: string
          format: date
          description: 除权除息日
        record_date:
          type: string
          format: date
          description: 股权登记日
        implement_date:
          type: string
          format: date
          description: 实施日（红股/现金到账日）
        bonus_per_10:
          type: number
          format: double
          description: 每10股送股数
          example: 0
        transfer_per_10:
          type: number
          format: double
          description: 每10股转增数
          example: 0
        cash_per_10:
          type: number
          format: double
          description: 每10股派息金额（元）
          example: 27.53
        allot_per_10:
          type: number
          format: double
          description: 每10股配股数
        allot_price:
          type: number
          format: double
          description: 配股价
        ex_div_price:
          type: number
          format: double
          description: 除权参考价
          nullable: true
        action_type:
          type: integer
          description: |
            公司行为类型编码：
            - 0=未知, 1=分红, 2=送股, 3=转增
            - 4=送转, 5=分红送转, 6=配股, 7=混合
          enum: [0, 1, 2, 3, 4, 5, 6, 7]

    DividendByDateResponse:
      type: object
      description: 按日期查询的响应
      properties:
        date:
          type: string
          format: date
          description: 查询日期
        has_corporate_action:
          type: boolean
          description: 该日是否有除权除息事件
        count:
          type: integer
          description: 事件条数
        data:
          type: array
          items:
            $ref: "#/components/schemas/DividendRecord"
          description: 分红记录列表

    DividendBySymbolResponse:
      type: object
      description: 按标的查询的响应
      properties:
        code:
          type: string
          description: 标的代码
        count:
          type: integer
          description: 历史分红条数
        data:
          type: array
          items:
            $ref: "#/components/schemas/DividendRecord"
          description: 分红记录列表

    DividendSymbolListResponse:
      type: object
      description: 无参数查询返回已导入的标的列表
      properties:
        count:
          type: integer
          description: 标的数量
        symbols:
          type: array
          items:
            type: string
          description: 标的代码列表

    DividendDownloadRequest:
      type: object
      description: 手动触发分红下载请求体（所有字段可选）
      properties:
        symbols:
          type: string
          description: |
            显式传入的标的列表，逗号分隔（如 000001.SZ,600519.SH）。
            优先级最高，传入则覆盖 from_strategies。
        from_strategies:
          type: boolean
          default: true
          description: 是否从活跃策略自动收集标的（默认 true）
        years:
          type: string
          description: 下载年份范围，如 2020-2026
        env:
          type: string
          description: Python 环境名称

    DividendDownloadResponse:
      type: object
      properties:
        status:
          type: string
          example: started
        symbol_count:
          type: integer
          description: 本次下载的标的数量

    DividendDeleteResponse:
      type: object
      properties:
        status:
          type: string
          enum: [deleted, dropped]
        code:
          type: string
          description: 被删除的标的代码（删除标的时返回）
